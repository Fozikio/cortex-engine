name: Publish to npm

# Publishes this package to npm using OIDC Trusted Publishing — no NPM_TOKEN,
# no 2FA OTP. The registry trusts this workflow's signed OIDC identity.
#
# Trigger: push a version tag (e.g. `git tag v1.2.2 && git push origin v1.2.2`)
#          or run manually via the Actions tab (workflow_dispatch).
#
# One-time prerequisite (npmjs.com → package → Settings → Trusted Publisher):
#   Provider:  GitHub Actions
#   Org/user:  Fozikio
#   Repository: <this repo>
#   Workflow:  publish.yml
#   Allowed action: npm publish   (must be selected explicitly for configs
#                                  created after 2026-05-20)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write   # REQUIRED: lets npm authenticate this run via OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          # NOTE: deliberately NO registry-url. setup-node's registry-url writes
          # an empty `_authToken` into .npmrc, which shadows OIDC (npm only does
          # trusted-publishing OIDC when no registry token is configured).

      # Trusted publishing requires npm >= 11.5.1. Node 24 ships npm 11.x, but
      # upgrade explicitly so the version is never in doubt.
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Diagnose OIDC prerequisites
        run: |
          echo "npm version: $(npm -v)"
          echo "node version: $(node -v)"
          echo "OIDC token URL present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Safety: a `v*` tag must match package.json (skipped for manual runs).
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public

  # Creates the GitHub Release for the tag once npm publish succeeds, so the
  # Releases page can never fall behind the registry again. Notes come from
  # the matching CHANGELOG.md section; if the section is missing (e.g. a
  # hotfix tagged without a changelog entry), falls back to auto-generated
  # notes so the release still exists.
  github-release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release from CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi

          # Extract this version's section (between its heading and the next "## [").
          # index() literal match avoids dynamic-regex escaping of "[" and ".".
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > notes.md

          if [ -s notes.md ]; then
            gh release create "$TAG" --title "$TAG" --notes-file notes.md
          else
            echo "::warning::No CHANGELOG.md section for $VERSION — using auto-generated notes."
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
